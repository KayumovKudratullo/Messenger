<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <link rel="stylesheet" href="{% static 'signup.css' %}">
</head>
<body>

<div class="container">

    <form method="POST" class="signup-box">

        {% csrf_token %}

        <h2>Sign in to your Account</h2>

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Sign In
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        

    </form>

</div>

</body>
</html>
